<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>WatchList</title>
<script
	src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
	integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
	crossorigin="anonymous"></script>
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
	crossorigin="anonymous">
<style>
.body {
	background: aqua;
}
</style>
</head>
<body>
	<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
		<div class="container">


			<a class="navbar-brand fw-bold text-warning" th:href="@{/index}">
				<img th:src="@{/images/MovieTime.png}" />
			</a>


			<button class="navbar-toggler" type="button"
				data-bs-toggle="collapse" data-bs-target="#navbarNav"
				aria-controls="navbarNav" aria-expanded="false"
				aria-label="Toggle navigation">

				<span class="navbar-toggler-icon"></span>
			</button>

			<div class="collapse navbar-collapse" id="navbarNav">

				<ul class="navbar-nav ms-auto">

					<li class="nav-item"><a class="nav-link active"
						th:href="@{/index}">Home</a></li>

					<li class="nav-item"><a class="nav-link" href="/logout">Logout</a>
					</li>

				</ul>

			</div>

		</div>
	</nav>
	<div class="container mt-4">
		<div>
			<h2 class="text-center text-warning fw-bold mb-0">My WatchList</h2>
		</div>
	</div>
	<div class="container mt-4">
		<div class="row g-3">

			<div class="col-lg-3 col-md-4 col-sm-6"
				th:each="wList : ${watchList}">
				<div class="card h-100 position-relative ">

					<img th:src="${wList.poster}" class="card-img-top movie-img">

					<div class="card-body text-center">
						<h6 class="card-title" th:text="${wList.Title}"></h6>

						<button type="button" class="btn btn-danger btn-sm"
							th:value="${wList.imdbID}" id="imdbid"
							onclick="deleteWatchList()">Delete</button>
					</div>
				</div>
			</div>

		</div>
	</div>
<script src="/js/MainFile.js"></script>
</body>
</html>
