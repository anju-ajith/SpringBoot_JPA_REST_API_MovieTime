<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>SignUp</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
	<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.3.1/css/all.css" integrity="sha384-mzrmE5qonljUremFsqc01SB46JvROS7bZs3IO2EmfFsd15uHvIt+Y8vEf7N7fWAU" crossorigin="anonymous">
	<link href="//maxcdn.bootstrapcdn.com/bootstrap/4.1.1/css/bootstrap.min.css" rel="stylesheet" id="bootstrap-css">	
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script> 
     <script src="//cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
     <link href="/css/login.css" rel="stylesheet" type="text/css">
</head>
<body>
<div class="container">
	<div class="d-flex justify-content-center h-100">
		<div class="card">
			<div class="card-header">
				<h3>Sign Up</h3>
				<div class="d-flex justify-content-end social_icon">
					<span><i class="fas fa-film"></i></span>
					<span><i class="fas fa-couch"></i></span>
					<span><i class="fas fa-bookmark"></i></span>
				</div>
			</div>
			<div class="card-body">
				<form th:action="@{/userRegistration}" method="post" th:object="${user}" >
				<div class="input-group form-group">
						<div class="input-group-prepend">
							
						</div>
						<input type="text" class="form-control" placeholder="name" th:field="*{name}" required>
						
					</div>
					<div class="input-group form-group">
						<div class="input-group-prepend">
							
						</div>
						<input type="text" class="form-control" placeholder="email" th:field="*{email}"  required>
						
					</div>
					<div class="input-group form-group">
						<div class="input-group-prepend">
						
						</div>
						<input type="password"  class="form-control" placeholder="password" th:field="*{password}"   required>
					</div>
					<div class="form-group">
				
						<input type="submit" value="Submit" id="btnSignup" class="btn float-right login_btn">
					</div>
				</form>
				
			</div>
			<div class="card-footer">
				<div class="d-flex justify-content-center links">
					Already have an account?<a href="/login">Sign In</a>
				</div>
			
				<!-- <div class="d-flex justify-content-center">
					<a href="#">Forgot your password?</a>
				</div> -->
			</div>
		</div>
	</div>
</div>


</body>
</html>
