<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Movie Details</title>
<link rel="stylesheet"
	href="https://bootswatch.com/4/cyborg/bootstrap.min.css">
<link href="/css/style.css" rel="stylesheet" type="text/css">

<style>
.LSpacing {
	margin-right: 10px;
}
</style>
</head>
<body>
	<nav class="navbar navbar-default" style="float: right;">
		<div class="container">
			<div class="navbar header">
				<h6 style="padding-top: 8px;" class="LSpacing"></h6>
				<a class="LSpacing" th:href="@{/index}">Home</a> <a class="LSpacing"
					th:href="@{/getWatchList}">WatchList</a> <a class="LSpacing" href="#">Logout</a>

			</div>
		</div>
	</nav>

	<div>
		<img style="padding: 10px" src="/images/MovieTime.png" />
	</div>
	<div id="successMsg" class="alert alert-success" style="display:none;width:400px">
    Movie added to WatchList successfully!
</div>
	<div style="padding-top: 60px; width: 100%;" class="container">

		<div class="card mb-3">
			<div class="row g-0">
				<div class="col-md-4">
					<img th:src="${movie.Poster}" class="img-fluid rounded-start"
						alt="...">
				</div>
				<div class="col-md-8">
					<div class="card-body">
						<h5 class="card-title" th:text="${movie.Title}"></h5>
						<p class="card-text">
							<strong>Genre:</strong> <small class="text-body-secondary ms-2"
								th:text="${movie.Genre}"></small>
						</p>
						<p class="card-text">
							<strong> Year:</strong><small class="text-body-secondary"
								th:text="${movie.Year}"></small>
						</p>
						<p class="card-text">
							<strong>IMDB Rating:</strong> <small class="text-body-secondary"
								th:text="${movie.imdbRating}"></small>
						</p>
						<p class="card-text">
							<strong> Director:</strong> <small class="text-body-secondary"
								th:text="${movie.Director}"></small>
						</p>
						<p class="card-text">
							<strong> Plot:</strong> <small class="text-body-secondary"
								th:text="${movie.Plot}"></small>
						</p>

					</div>

				</div>
			</div>

		</div>


		<button    th:if="${watchlisted}" class="btn login_btn"
			style="background-color: #F5C518; color: black; font-weight: bold;" onclick="addToWatchList()" th:value="${imdbId}" id="imdbIds">Add
			To WatchList</button>
			<button th:if="${!watchlisted}" class="btn login_btn"
			style="background-color: #F5C518; color: black; font-weight: bold;" onclick="removeFromWatchList()" th:value="${imdbId}" id="removeimdbIds">WatchListed</button>
			

		<a th:href="@{/index}" class="btn btn-default">Go Back To Search</a>
		
	

	</div>
	<script src="https://code.jquery.com/jquery-3.5.1.min.js"
		integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0="
		crossorigin="anonymous"></script>
	<script src="https://unpkg.com/axios/dist/axios.min.js"></script>
	<script src="/js/MainFile.js"></script>
</body>
</html>
